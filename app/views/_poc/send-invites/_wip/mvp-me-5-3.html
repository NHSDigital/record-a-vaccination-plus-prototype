{% extends 'e2e-layout3.html' %}

{% set currentSection = "organise" %}

{% block pageTitle %}
  Sortable table
<script src="/js/send-invite-data/patient-data-v2.js"></script>

<script>
(function(){
  var PAGE_SIZE = 25;
  var activeRows = [];
  var removedRows = [];


  // Helper: convert dd/mm/yyyy -> yyyy-mm-dd (for sorting only)
  function dmyToISO(s){
    var m = /^([0-3]?\d)\/([0-1]?\d)\/(\d{4})$/.exec(String(s||'').trim());
    if (!m) return '';
    var dd = ('0'+m[1]).slice(-2), mm = ('0'+m[2]).slice(-2), yyyy = m[3];
    return yyyy + '-' + mm + '-' + dd;
  }
  // Indices of columns that contain dd/mm/yyyy
  var dateCols = [];
  // === Column hiding config ===
  // Add header names here (case-insensitive) to hide those columns from the table
  var HIDDEN_COLUMNS = (window.HIDDEN_COLUMNS || []);
  function norm(s){ return String(s||'').trim().toLowerCase(); }
  // Indices (in the original data) that are visible after hiding
  var visibleColIndices = [];
  function hasMOJ(){ return window.MOJFrontend && MOJFrontend.SortableTable; }
  function initMOJ(){
    try{
      if (window.MOJFrontend && MOJFrontend.initAll) MOJFrontend.initAll();
      document.querySelectorAll('[data-module="moj-sortable-table"]').forEach(function(el){
        try { if (el.__mojSortable && el.__mojSortable.destroy) el.__mojSortable.destroy(); } catch(_){}
        if (hasMOJ()) el.__mojSortable = new MOJFrontend.SortableTable(el);
      });
    }catch(e){}
  }
  function buildHeader(columns){
  var headRow = document.getElementById('head-row');
  var suppHead = document.getElementById('suppressed-head-row');
  if (headRow) headRow.innerHTML = '';
  if (suppHead) suppHead.innerHTML = '';
  visibleColIndices = [];
  // Action column first (not sortable)
  var thAction = document.createElement('th');
  thAction.className = 'nhsuk-table__header is-sticky-col table-col-action';
  thAction.textContent = 'Action';
  if (headRow) headRow.appendChild(thAction.cloneNode(true));
  if (suppHead) suppHead.appendChild(thAction.cloneNode(true));
  columns.forEach(function(c, i){
    if ((window.HIDDEN_COLUMNS || HIDDEN_COLUMNS).map(norm).indexOf(norm(c)) !== -1) return;
    visibleColIndices.push(i);
    function makeTh(){
      var th = document.createElement('th');
      th.className = 'nhsuk-table__header';
      th.setAttribute('scope','col');
      th.setAttribute('aria-sort', (norm(c) === 'patient name') ? 'ascending' : 'none');
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'govuk-link moj-sortable__button';
      btn.setAttribute('data-index', String(visibleColIndices.length-1));
      btn.textContent = c;
      th.appendChild(btn);
      return th;
    }
    if (headRow) headRow.appendChild(makeTh());
    if (suppHead) suppHead.appendChild(makeTh());
  });
});
  }
  function buildRow(row, removedMode){
  var tr = document.createElement('tr');
  tr.className = 'nhsuk-table__row';
  // store a key for lookup
  try{ tr.dataset.key = JSON.stringify(row); }catch(e){ tr.dataset.key = ''; }
  // Action cell
  var tdA = document.createElement('td');
  tdA.className = 'nhsuk-table__cell is-sticky-col table-col-action';
  var link = document.createElement('a'); link.href='#/'; link.className='nhsuk-link nhsuk-link--no-visited-state';
  if (removedMode){ link.setAttribute('data-add-back',''); link.textContent='Add back'; }
  else { link.setAttribute('data-remove',''); link.textContent='Remove'; }
  tdA.appendChild(link); tr.appendChild(tdA);
  // Normal cells
  visibleColIndices.forEach(function(origIdx){
    var val = row[origIdx];
    var td = document.createElement('td');
    td.className = 'nhsuk-table__cell';
    if (Array.isArray(dateCols) && dateCols.indexOf(origIdx) !== -1){
      var iso = dmyToISO(val); if (iso) td.setAttribute('data-sort-value', iso);
    }
    td.textContent = (val==null ? '' : String(val));
    tr.appendChild(td);
  });
  return tr;
}
  function showPage(rows, page){
    var tbody = document.getElementById('body');
    var start = (page-1) * PAGE_SIZE;
    var end = start + PAGE_SIZE;
    tbody.innerHTML = '';
    var frag = document.createDocumentFragment();
    rows.slice(start, end).forEach(function(r){ frag.appendChild(buildRow(r, false)); });
    tbody.appendChild(frag);
    initMOJ();
  }
  function numberWindow(total, current){
    var out = [];
    var max = 5;
    var start = Math.max(1, current - 2);
    var end   = Math.min(total, start + max - 1);
    if (end - start < max - 1) start = Math.max(1, end - max + 1);
    if (start > 1){ out.push(1); if (start > 2) out.push('…'); }
    for (var n=start; n<=end; n++) out.push(n);
    if (end < total){ if (end < total - 1) out.push('…'); out.push(total); }
    return out;
  }
  function renderPager(total, current){
    var host = document.getElementById('pagination');
    if(!host) return;
    var pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    current = Math.min(Math.max(1, current), pages);
    var nav = document.createElement('nav');
    nav.className = 'nhsuk-pagination nhsuk-pagination--numbered';
    nav.setAttribute('role','navigation');
    nav.setAttribute('aria-label','Pagination');
    var ul = document.createElement('ul');
    ul.className = 'nhsuk-pagination__list';
    function addPrev(){
      var li = document.createElement('li');
      li.className = 'nhsuk-pagination__item nhsuk-pagination__item--previous';
      var a = document.createElement('a');
      a.className = 'nhsuk-pagination__link nhsuk-pagination__link--prev';
      a.href = '#/';
      a.dataset.page = String(current - 1);
      a.innerHTML = '<span class="nhsuk-pagination__title">Previous<span class="nhsuk-u-visually-hidden"> page</span></span>';
      if (current === 1) a.setAttribute('aria-disabled','true');
      li.appendChild(a); ul.appendChild(li);
    }
    function addNext(){
      var li = document.createElement('li');
      li.className = 'nhsuk-pagination__item nhsuk-pagination__item--next';
      var a = document.createElement('a');
      a.className = 'nhsuk-pagination__link nhsuk-pagination__link--next';
      a.href = '#/';
      a.dataset.page = String(current + 1);
      a.innerHTML = '<span class="nhsuk-pagination__title">Next<span class="nhsuk-u-visually-hidden"> page</span></span>';
      if (current === pages) a.setAttribute('aria-disabled','true');
      li.appendChild(a); ul.appendChild(li);
    }
    addPrev();
    numberWindow(pages, current).forEach(function(token){
      var li = document.createElement('li');
      if (token === '…'){
        li.className = 'nhsuk-pagination__item nhsuk-pagination__item--ellipsis';
        li.innerHTML = '&ctdot;';
      } else {
        li.className = 'nhsuk-pagination__item';
        var a = document.createElement('a');
        a.className = 'nhsuk-pagination__link';
        a.href = '#/';
        a.textContent = token;
        a.dataset.page = String(token);
        if (token === current) a.setAttribute('aria-current','page');
        li.appendChild(a);
      }
      ul.appendChild(li);
    });
    addNext();
    nav.appendChild(ul);
    host.innerHTML = '';
    host.appendChild(nav);
  }
  function wirePager(rows){
    var host = document.getElementById('pagination');
    if(!host) return;
    host.addEventListener('click', function(e){
      var a = e.target.closest('a.nhsuk-pagination__link');
      if (!a || a.getAttribute('aria-disabled') === 'true') return;
      e.preventDefault();
      var page = parseInt(a.dataset.page, 10);
      showPage(rows, page);
      renderPager(rows.length, page);
    });
  }
  function start(){
    var data = window.patientData;
    if (!data || !data.columns || !data.rows) return;
    buildHeader(data.columns);
    // Detect date columns (dd/mm/yyyy)
    dateCols = [];
    data.columns.forEach(function(c, i){
      var hasDate = (data.rows || []).some(function(r){
        var v = r[i];
        return typeof v === 'string' && /^\s*[0-3]?\d\/[0-1]?\d\/\d{4}\s*$/.test(v);
      });
      if (hasDate) dateCols.push(i);
    });
    var page = 1;
    showPage(data.rows, page);
    renderPager(data.rows.length, page);
    wirePager(activeRows);

  // --- Removed table rendering ---
  function renderRemoved(){
    var tbody = document.getElementById('suppressed-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    var frag = document.createDocumentFragment();
    removedRows.forEach(function(r){ frag.appendChild(buildRow(r, true)); });
    tbody.appendChild(frag);
    initMOJ();
  }

  // --- Move handlers ---
  document.addEventListener('click', function(e){
    var rem = e.target && e.target.closest('[data-remove]');
    if (!rem) return;
    e.preventDefault();
    var tr = rem.closest('tr'); if (!tr) return;
    var key = tr.dataset.key || '';
    // find row in activeRows
    var idx = activeRows.findIndex(function(r){ try{return JSON.stringify(r)===key;}catch(e){return false;} });
    if (idx > -1){
      removedRows.push(activeRows[idx]);
      activeRows.splice(idx,1);
      // re-render main current page
      var host = document.getElementById('pagination');
      var currentPageEl = host && host.querySelector('[aria-current="page"]');
      var page = currentPageEl ? parseInt(currentPageEl.textContent,10) : 1;
      showPage(activeRows, page);
      renderPager(activeRows.length, page);
      renderRemoved();
    }
  });

  document.addEventListener('click', function(e){
    var add = e.target && e.target.closest('[data-add-back]');
    if (!add) return;
    e.preventDefault();
    var tr = add.closest('tr'); if (!tr) return;
    var key = tr.dataset.key || '';
    var idx = removedRows.findIndex(function(r){ try{return JSON.stringify(r)===key;}catch(e){return false;} });
    if (idx > -1){
      activeRows.push(removedRows[idx]);
      removedRows.splice(idx,1);
      // update both views
      var host = document.getElementById('pagination');
      var currentPageEl = host && host.querySelector('[aria-current="page"]');
      var page = currentPageEl ? parseInt(currentPageEl.textContent,10) : 1;
      showPage(activeRows, page);
      renderPager(activeRows.length, page);
      renderRemoved();
    }
  });

  // --- Sub-navigation ---
  (function(){
    var linkV = document.getElementById('linkVaccinated');
    var linkR = document.getElementById('linkRemoved');
    var panelMain = document.getElementById('panelMain');
    var panelSupp = document.getElementById('panelSuppressed');
    if (linkV && linkR && panelMain && panelSupp){
      function showV(e){ if(e) e.preventDefault(); panelMain.style.display='block'; panelSupp.classList.add('hiddenPanel'); }
      function showR(e){ if(e) e.preventDefault(); panelMain.style.display='none'; panelSupp.classList.remove('hiddenPanel'); renderRemoved(); }
      linkV.addEventListener('click', showV);
      linkR.addEventListener('click', showR);
    }
  })();


  }
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){
      if (window.patientData) start();
      else setTimeout(start, 0);
    });
  } else {
    if (window.patientData) start();
    else setTimeout(start, 0);
  }
})();


  // --- Removed pagination ---
  function showSuppPage(rows, page){
    var tbody = document.getElementById('suppressed-body');
    if (!tbody) return;
    var PAGE = 25;
    var start = (page-1) * PAGE, end = start + PAGE;

    var frag = document.createDocumentFragment();

    tbody.appendChild(frag);
    initMOJ();
  }
  function numberWindowSupp(total, current){
    var out = [], max = 5;
    var start = Math.max(1, current - 2);
    var end   = Math.min(total, start + max - 1);
    if (end - start < max - 1) start = Math.max(1, end - max + 1);
    if (start > 1){ out.push(1); if (start > 2) out.push('…'); }
    for (var n=start; n<=end; n++) out.push(n);
    if (end < total){ if (end < total - 1) out.push('…'); out.push(total); }
    return out;
  }
  function renderSuppPager(total, current){
    var host = document.getElementById('suppressed-pagination');
    if(!host) return;
    var PAGE = 25;
    var pages = Math.max(1, Math.ceil(total / PAGE));
    current = Math.min(Math.max(1, current), pages);
    var nav = document.createElement('nav');
    nav.className = 'nhsuk-pagination nhsuk-pagination--numbered';
    nav.setAttribute('role','navigation');
    nav.setAttribute('aria-label','Pagination');
    var ul = document.createElement('ul');
    ul.className = 'nhsuk-pagination__list';
    function addPrev(){
      var li = document.createElement('li');
      li.className = 'nhsuk-pagination__item nhsuk-pagination__item--previous';
      var a = document.createElement('a');
      a.className = 'nhsuk-pagination__link nhsuk-pagination__link--prev';
      a.href = '#/';
      a.dataset.page = String(current - 1);
      a.innerHTML = '<span class="nhsuk-pagination__title">Previous<span class="nhsuk-u-visually-hidden"> page</span></span>';
      if (current === 1) a.setAttribute('aria-disabled','true');
      li.appendChild(a); ul.appendChild(li);
    }
    function addNext(){
      var li = document.createElement('li');
      li.className = 'nhsuk-pagination__item nhsuk-pagination__item--next';
      var a = document.createElement('a');
      a.className = 'nhsuk-pagination__link nhsuk-pagination__link--next';
      a.href = '#/';
      a.dataset.page = String(current + 1);
      a.innerHTML = '<span class="nhsuk-pagination__title">Next<span class="nhsuk-u-visually-hidden"> page</span></span>';
      if (current === pages) a.setAttribute('aria-disabled','true');
      li.appendChild(a); ul.appendChild(li);
    }
    addPrev();
    numberWindowSupp(pages, current).forEach(function(token){
      var li = document.createElement('li');
      if (token === '…'){
        li.className = 'nhsuk-pagination__item nhsuk-pagination__item--ellipsis';
        li.innerHTML = '&ctdot;';
      } else {
        li.className = 'nhsuk-pagination__item';
        var a = document.createElement('a');
        a.className = 'nhsuk-pagination__link';
        a.href = '#/';
        a.textContent = token;
        a.dataset.page = String(token);
        if (token === current) a.setAttribute('aria-current','page');
        li.appendChild(a);
      }
      ul.appendChild(li);
    });
    addNext();
    nav.appendChild(ul);
    host.innerHTML = '';
    host.appendChild(nav);
  }
  function wireSuppPager(rows){
    var host = document.getElementById('suppressed-pagination');
    if(!host) return;
    host.addEventListener('click', function(e){
      var a = e.target.closest('a.nhsuk-pagination__link');
      if (!a || a.getAttribute('aria-disabled') === 'true') return;
      e.preventDefault();
      var page = parseInt(a.dataset.page, 10);
      showSuppPage(rows, page);
      renderSuppPager(rows.length, page);
    });
  }

  // --- Badge counts ---
  function updateBadges(){
    var bV = document.getElementById('badgeVaccinated');
    var bR = document.getElementById('badgeRemoved');
    if (bV) bV.textContent = String(activeRows.length || 0);
    if (bR) bR.textContent = String(removedRows.length || 0);
  }
</script>

{% endblock %}

(function(){
  function norm(s){ return String(s||'').trim().toLowerCase(); }
  var wanted = (window.HIDDEN_COLUMNS || []).map(norm);
  if (!wanted.length) return;

    var headRow = document.getElementById('head-row');
    var tbody   = document.getElementById('body');
    if (!headRow || !tbody) return;

    // determine which header indices to hide
    var ths = Array.from(headRow.children);
    var hiddenIdx = ths
      .map((th,i)=>({i,txt:norm(th.textContent)}))
      .filter(o => wanted.includes(o.txt))
      .map(o => o.i);

    // hide header cells
    hiddenIdx.forEach(i => {
      if (ths[i]) ths[i].style.display = 'none';
    });

    // hide data cells in each row
    Array.from(tbody.querySelectorAll('tr')).forEach(tr=>{
      hiddenIdx.forEach(i => {
        if (tr.children[i]) tr.children[i].style.display = 'none';
      });
    });
  }

  // run once initial table loads
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', apply);
  } else {
    apply();
  }

  // re-apply whenever pagination rebuilds rows
  document.addEventListener('click', function(e){
    if (e.target.closest('.nhsuk-pagination')) {
      setTimeout(apply, 0);
    }
  });

  // re-apply after MOJ sortable resort
  document.addEventListener('click', function(e){
    if (e.target.closest('.moj-sortable__button')) {
      setTimeout(apply, 0);
    }
  });

})();

</script>

{% endblock %}
