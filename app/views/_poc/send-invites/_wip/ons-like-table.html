{% extends "layout.html" %}

{% block pageTitle %}ONS‑style scrollable table (NHS styles){% endblock %}

{% block head %}
  <style>
    /* Scrollable container (ONS-like) with NHS look */
    .ons-like-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; background: #ffffff; border: 1px solid #d8dde0; border-left: 0; border-right: 0; padding: 0; margin: 0; }
    .ons-like-scroll:focus { outline: 3px solid #ffbf47; outline-offset: 0; }

    /* NHS table base */
    .nhsuk-table { margin-bottom: 0; min-width: 640px; width: 100%; border-collapse: collapse; table-layout: auto; }
    .nhsuk-table thead th { position: sticky; top: 0; z-index: 2; background: #f0f4f5; box-shadow: inset 0 -1px 0 #d8dde0; white-space: nowrap; }

    /* Cells */
    .nhsuk-table__cell, .nhsuk-table__header { background-color: #f0f4f5; white-space: nowrap; }
    .nhsuk-table__row:hover .nhsuk-table__cell, .nhsuk-table__row:hover .nhsuk-table__header { background-color: #f0f4f5; }

    /* Sticky first column for actions */
    .is-sticky-col { position: sticky; left: 0; z-index: 3; background: #f0f4f5; box-shadow: inset -1px 0 0 #d8dde0; }

    /* Column utilities */
    .table-col-action { width: 1%; white-space: nowrap; }
    .is-numeric { text-align: right; }

    /* Remove link (standard NHS link) */
    .link-row-remove.nhsuk-link { white-space: nowrap; }

    /* Empty state */
    .table-empty { text-align: center; font-style: italic; color: #425563; white-space: normal; }

    /* Truncate long text with ellipsis on selected columns */
    .truncate { max-width: 16rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
{% endblock %}

{% block content %}
<div class="nhsuk-width-container">
  <main class="nhsuk-main-wrapper" id="maincontent" role="main">
    <h1 class="nhsuk-heading-l">NHS table behaving like ONS scrollable table</h1>

    <div class="ons-like-scroll" role="region" tabindex="0" aria-label="Scrollable data table" data-src="{{ assetPath }}/send-invites-patient-data.json">
      <table class="nhsuk-table" aria-describedby="table-caption">
        <caption id="table-caption" class="nhsuk-table__caption nhsuk-u-visually-hidden">Spreadsheet data with removable rows</caption>
        <thead class="nhsuk-table__head">
          <tr class="nhsuk-table__row" id="table-head-row">
            <!-- Header cells are generated from JSON (Actions + spreadsheet columns) -->
          </tr>
        </thead>
        <tbody class="nhsuk-table__body" id="removable-table-body">
          <!-- Rows populated from JSON -->
        </tbody>
      </table>
    </div>

    <div class="nhsuk-u-visually-hidden" aria-live="polite" id="table-live"></div>

    <script>
      (function(){
        var theadRow = document.getElementById('table-head-row');
        var tbody = document.getElementById('removable-table-body');
        var live = document.getElementById('table-live');
        var container = document.querySelector('.ons-like-scroll');

        function announce(msg){ if(live){ live.textContent = msg; } }

        function updateEmptyState(){
          if (!tbody) return;
          if (tbody.children.length === 0) {
            var tr = document.createElement('tr'); tr.className = 'nhsuk-table__row';
            var td = document.createElement('td'); td.className = 'nhsuk-table__cell table-empty';
            td.colSpan = (theadRow && theadRow.children.length) ? theadRow.children.length : 1;
            td.textContent = 'There are no entries in the table.'; tr.appendChild(td); tbody.appendChild(tr);
          }
        }

        function buildHeader(columns){
          theadRow.innerHTML = '';
          var thAction = document.createElement('th'); thAction.scope = 'col'; thAction.className = 'nhsuk-table__header table-col-action is-sticky-col'; thAction.textContent = 'Actions';
          theadRow.appendChild(thAction);
          columns.forEach(function(col){
            var th = document.createElement('th'); th.scope = 'col'; th.className = 'nhsuk-table__header'; th.textContent = col; theadRow.appendChild(th);
          });
        }

        function buildRow(values){
          var tr = document.createElement('tr'); tr.className = 'nhsuk-table__row';
          // Action cell
          var tdAction = document.createElement('td'); tdAction.className = 'nhsuk-table__cell table-col-action is-sticky-col';
          var a = document.createElement('a'); a.href = '#'; a.className = 'nhsuk-link nhsuk-link--no-visited-state link-row-remove'; a.setAttribute('data-remove',''); a.innerHTML = 'Remove<span class="nhsuk-u-visually-hidden"> this row</span>';
          tdAction.appendChild(a); tr.appendChild(tdAction);
          // Data cells
          values.forEach(function(v, i){ 
            var td = document.createElement('td'); td.className = 'nhsuk-table__cell';
            // Example: truncate only on columns beyond index 3
            if(i >= 3){ td.classList.add('truncate'); }
            td.textContent = (v==null?'':String(v)); tr.appendChild(td);
          });
          return tr;
        }

        function onClick(e){
          var btn = e.target.closest('[data-remove]'); if(!btn) return; e.preventDefault();
          var row = btn.closest('tr'); if(!row) return; var labelCell = row.querySelector('td:nth-child(2)');
          var label = labelCell ? labelCell.textContent.trim() : 'row'; row.remove(); announce(label + ' removed from table'); updateEmptyState();
        }
        document.addEventListener('click', onClick);

        async function loadData(){
          var src = container ? container.getAttribute('data-src') : null; if (!src) return null;
          try { const res = await fetch(src, { cache: 'no-cache' }); if (res.ok) return await res.json(); console.error('Fetch failed', res.status, res.statusText); } catch(e){ console.error('Fetch error', e); }
          return null;
        }

        (async function init(){
          var data = await loadData(); if (!data) { updateEmptyState(); return; }
          var columns, rows;
          if (Array.isArray(data)) { columns = Object.keys(data[0]||{}); rows = data.map(function(o){ return columns.map(function(c){ return o[c]; }); }); }
          else if (data.columns && data.rows) { columns = data.columns; rows = data.rows; }
          else { updateEmptyState(); return; }
          buildHeader(columns);
          var frag = document.createDocumentFragment(); rows.forEach(function(vals){ frag.appendChild(buildRow(vals)); });
          tbody.innerHTML = ''; tbody.appendChild(frag); updateEmptyState();
        })();
      })();
    </script>
  </main>
</div>
{% endblock %}
