{% extends 'ravs-plus-layout-1-oh.html' %}

{% set currentSection = "plus" %}

{% block pageTitle %}
  Confirm CSV upload type
{% endblock %}

{% block beforeContent %}
  <a class="nhsuk-back-link" href="javascript:history.back()">
    Back
  </a>
{% endblock %}

{% block content %}
  <div class="nhsuk-grid-row">
    <div class="nhsuk-grid-column-two-thirds">

      <div class="nhsuk-form-group">
        <fieldset class="nhsuk-fieldset">
          <legend class="nhsuk-fieldset__legend nhsuk-fieldset__legend--l">
            <h1 class="nhsuk-fieldset__heading">
              Confirm CSV upload type
            </h1>
          </legend>
          <div class="nhsuk-radios" data-module="nhsuk-radios">
            <div class="nhsuk-radios__item">
              <input class="nhsuk-radios__input" id="example" name="example" type="radio" value="type-maternity">
              <label class="nhsuk-label nhsuk-radios__label" for="example">
                Maternity
              </label>
            </div>
            <div class="nhsuk-radios__item">
              <input class="nhsuk-radios__input" id="example-2" name="example" type="radio" value="type-occupational-health">
              <label class="nhsuk-label nhsuk-radios__label" for="example-2">
                Occupational health
              </label>
            </div>
          </div>
        </fieldset>

        <form class="form" action="upload-complete" method="post">
          <button class="nhsuk-button nhsuk-u-margin-top-6" data-module="nhsuk-button" data-prevent-double-click="true" type="submit" >
            Continue
          </button>
        </form>

      </div>

    </div>
  </div>
{% endblock %}
